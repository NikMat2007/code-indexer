version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: code_index_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_index
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - code_index_network

  api:
    build: .
    container_name: code_index_api
    ports:
      - "8000:8000"
    volumes:
      - ./sample_data:/app/sample_data
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/code_index
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - code_index_network

networks:
  code_index_network:
    driver: bridge

volumes:
  postgres_data: